schema_version: 3
name: claude-code-groq-difficulty-v1
profiles:
  easy:
    target: groq-oss-20b
    parameters: {max_tokens: 4096, reasoning_effort: low}
  hard:
    target: groq-oss-120b
    parameters: {max_tokens: 4096, reasoning_effort: high}
method:
  type: difficulty
  classifier:
    type: llm
    target: groq-oss-20b
    prompt: {type: file, path: ../prompts/difficulty-v1.txt}
    fallback: easy
    max_prompt_chars: 1200
    parameters: {max_tokens: 256, temperature: 0.0, reasoning_effort: low}
  easy: easy
  hard: hard
  route_memory: {enabled: true}
