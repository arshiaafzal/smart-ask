schema_version: 3
name: python-function-completion-cascade-v1
profiles:
  easy:
    target: openrouter-gemini-flash-lite
    system_prompt: {type: file, path: ../prompts/python-function-completion-system.txt}
    parameters: {max_tokens: 1024, temperature: 0.0}
  hard:
    target: openrouter-claude-opus-4-8
    system_prompt: {type: file, path: ../prompts/python-function-completion-system.txt}
    parameters: {max_tokens: 1024, temperature: 0.0}
method:
  type: cascade
  classifier:
    type: llm
    target: openrouter-gemini-flash-lite
    prompt: {type: file, path: ../prompts/difficulty-v1.txt}
    fallback: easy
    max_prompt_chars: 1200
    parameters: {max_tokens: 20, temperature: 0.0}
  escalation:
    type: marker
    marker: ESCALATE_NOW
    self_check_suffix: {type: file, path: ../prompts/marker-self-check.txt}
    escalation_prefix: {type: file, path: ../prompts/marker-escalation.txt}
    tool_output: accept-and-pin
  easy: easy
  hard: hard
  route_memory: {enabled: true}
